<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>とうまセルフレジ 完全版（OCR対応）</title>

<style>
body { font-family: sans-serif; text-align: center; }
button { font-size: 18px; margin: 5px; padding: 10px; }
#cart { margin-top: 20px; }
#admin { display:none; border:1px solid black; padding:10px; margin-top:20px;}
#scanner-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); }
#scanner-view { width:100%; height:80%; }
#ocr-canvas { display:none; }
</style>

<!-- バーコードライブラリ -->
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
<!-- OCRライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
</head>
<body>

<h1>とうまセルフレジ 完全版（OCR対応）</h1>

<!-- レジ用スキャン -->
<input type="text" id="barcode" placeholder="バーコード入力">
<button onclick="scan()">スキャン</button>
<br><br>
<button onclick="startCamera('cart')">📷カメラでスキャン（レジ用）</button>

<!-- カメラ表示領域 -->
<div id="scanner-container">
  <button onclick="stopScanner()" style="font-size:20px; margin:10px;">✖ 閉じる</button>
  <div id="scanner-view"></div>
</div>

<div id="cart"></div>
<h2 id="total">合計: 0円</h2>
<button onclick="checkout()">お会計</button>

<br><br>
<select id="soundSelect">
  <option value="beep">ピッ音①</option>
  <option value="beep2">ピッ音②</option>
</select>

<br><br>
<button onclick="adminLogin()">🔒管理者モード</button>

<div id="admin">
  <h3>商品登録</h3>
  名前：<input id="newName"><button onclick="ocrRead('name')">📷読み取り</button><br>
  値段：<input id="newPrice"><button onclick="ocrRead('price')">📷読み取り</button><br>
  バーコード：<input id="newCode"><button onclick="startCamera('admin')">📷バーコード読み取り</button><br>
  <button onclick="addProduct()">追加</button>
</div>

<canvas id="ocr-canvas"></canvas>

<script>
let products = {
  "4901777300449": { name: "ポテチ", price: 150 },
  "4902888254537": { name: "チョコ", price: 120 }
};

let cart = [];
let total = 0;
let scannerTarget = null;

// 音
function playSound(){
  let type = document.getElementById("soundSelect").value;
  let audio;
  if(type === "beep"){
    audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
  } else {
    audio = new Audio("https://www.soundjay.com/button/beep-10.wav");
  }
  audio.play();
}

// レジ用スキャン
function scan(){
  let code = document.getElementById("barcode").value;
  let product = products[code];

  if(product){
    cart.push(product);
    total += product.price;

    document.getElementById("cart").innerHTML += product.name + " - " + product.price + "円<br>";
    document.getElementById("total").innerText = "合計: " + total + "円";

    playSound();
  } else {
    alert("商品なし！");
  }

  document.getElementById("barcode").value = "";
}

// お会計
function checkout(){
  let receipt = "🧾 レシート\n\n";
  cart.forEach(item=>{
    receipt += item.name + " - " + item.price + "円\n";
  });
  receipt += "\n合計: " + total + "円";
  alert(receipt);

  let thanks = new Audio("https://www.soundjay.com/human/thank-you-01.mp3");
  thanks.play();

  cart = [];
  total = 0;
  document.getElementById("cart").innerHTML = "";
  document.getElementById("total").innerText = "合計: 0円";
}

// 管理者ログイン
function adminLogin(){
  let pass = prompt("パスコード入力");
  if(pass === "2312026"){
    document.getElementById("admin").style.display = "block";
  } else {
    alert("違います");
  }
}

// 商品追加
function addProduct(){
  let name = document.getElementById("newName").value;
  let price = document.getElementById("newPrice").value;
  let code = document.getElementById("newCode").value;

  if(!name || !price || !code){
    alert("全部入力してください！");
    return;
  }

  products[code] = { name: name, price: Number(price) };
  alert("追加完了！");
}

// ーーーーー カメラスキャン機能 ーーーーー
function startCamera(target){
  scannerTarget = target; // cart or admin
  document.getElementById("scanner-container").style.display = "block";

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#scanner-view'),
      constraints: { facingMode: "environment" },
    },
    decoder: { readers: ["ean_reader"] },
  }, function(err) {
    if(err){ console.error(err); alert("カメラが使えません"); stopScanner(); return; }
    Quagga.start();
  });

  Quagga.onDetected(function(result){
    let code = result.codeResult.code;
    stopScanner();
    if(scannerTarget === 'cart'){
      document.getElementById("barcode").value = code;
      scan();
    } else if(scannerTarget === 'admin'){
      document.getElementById("newCode").value = code;
    }
  });
}

function stopScanner(){
  Quagga.stop();
  document.getElementById("scanner-container").style.display = "none";
}

// ーーーーー OCR読み取り機能 ーーーーー
function ocrRead(field){
  let video = document.createElement("video");
  navigator.mediaDevices.getUserMedia({ video:true }).then(stream=>{
    video.srcObject = stream;
    video.play();

    let canvas = document.getElementById("ocr-canvas");
    let ctx = canvas.getContext("2d");
    canvas.width = 640; canvas.height = 480;

    setTimeout(()=>{
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      let imageData = canvas.toDataURL("image/png");

      Tesseract.recognize(imageData,'jpn',{ logger: m => console.log(m) })
        .then(({ data: { text } })=>{
          text = text.replace(/\n/g,'').trim();
          if(field==='name'){
            document.getElementById("newName").value = text;
          } else if(field==='price'){
            let num = text.replace(/\D/g,''); // 数字だけ抽出
            document.getElementById("newPrice").value = num;
          }
          stream.getTracks().forEach(t=>t.stop());
        });
    },2000); // 2秒後に撮影
  });
}
</script>

</body>
</html>
