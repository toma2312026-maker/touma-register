<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>とうまセルフレジ 完全版</title>

<style>
body { font-family: sans-serif; text-align: center; }
button { font-size: 18px; margin: 5px; padding: 10px; }
#cart { margin-top: 20px; }
#admin { display:none; border:1px solid black; padding:10px; margin-top:20px;}
#scanner-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); }
#scanner-view { width:100%; height:80%; }
</style>

<!-- QuaggaJS（バーコードライブラリ） -->
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
</head>
<body>

<h1>とうまセルフレジ 完全版</h1>

<!-- バーコード入力 -->
<input type="text" id="barcode" placeholder="バーコード入力">
<button onclick="scan()">スキャン</button>

<!-- カメラ -->
<br><br>
<button onclick="startCamera()">📷カメラでスキャン</button>

<!-- カメラ表示領域 -->
<div id="scanner-container">
  <button onclick="stopScanner()" style="font-size:20px; margin:10px;">✖ 閉じる</button>
  <div id="scanner-view"></div>
</div>

<div id="cart"></div>
<h2 id="total">合計: 0円</h2>

<button onclick="checkout()">お会計</button>

<br><br>

<!-- 音選択 -->
<select id="soundSelect">
  <option value="beep">ピッ音①</option>
  <option value="beep2">ピッ音②</option>
</select>

<!-- 管理者 -->
<br><br>
<button onclick="adminLogin()">🔒管理者モード</button>

<div id="admin">
  <h3>商品登録</h3>
  名前：<input id="newName"><br>
  値段：<input id="newPrice"><br>
  バーコード：<input id="newCode"><br>
  <button onclick="addProduct()">追加</button>
</div>

<script>
let products = {
  "4901777300449": { name: "ポテチ", price: 150 },
  "4902888254537": { name: "チョコ", price: 120 }
};

let cart = [];
let total = 0;

// 音
function playSound(){
  let type = document.getElementById("soundSelect").value;
  let audio;
  if(type === "beep"){
    audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
  } else {
    audio = new Audio("https://www.soundjay.com/button/beep-10.wav");
  }
  audio.play();
}

// スキャン（手動入力もしくはカメラ読み取り）
function scan(){
  let code = document.getElementById("barcode").value;
  let product = products[code];

  if(product){
    cart.push(product);
    total += product.price;

    document.getElementById("cart").innerHTML += product.name + " - " + product.price + "円<br>";
    document.getElementById("total").innerText = "合計: " + total + "円";

    playSound();
  } else {
    alert("商品なし！");
  }

  document.getElementById("barcode").value = "";
}

// お会計（レシート）
function checkout(){
  let receipt = "🧾 レシート\n\n";

  cart.forEach(item=>{
    receipt += item.name + " - " + item.price + "円\n";
  });

  receipt += "\n合計: " + total + "円";

  alert(receipt);

  let thanks = new Audio("https://www.soundjay.com/human/thank-you-01.mp3");
  thanks.play();

  cart = [];
  total = 0;
  document.getElementById("cart").innerHTML = "";
  document.getElementById("total").innerText = "合計: 0円";
}

// 管理者ログイン
function adminLogin(){
  let pass = prompt("パスコード入力");
  if(pass === "2312026"){
    document.getElementById("admin").style.display = "block";
  } else {
    alert("違います");
  }
}

// 商品追加
function addProduct(){
  let name = document.getElementById("newName").value;
  let price = document.getElementById("newPrice").value;
  let code = document.getElementById("newCode").value;

  products[code] = { name: name, price: Number(price) };

  alert("追加完了！");
}

// ーーーーー 本物のカメラスキャン機能 ーーーーー
function startCamera(){
  document.getElementById("scanner-container").style.display = "block";

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#scanner-view'),
      constraints: {
        facingMode: "environment" // 背面カメラ
      },
    },
    decoder: {
      readers: ["ean_reader"]
    },
  }, function(err) {
    if (err) {
      console.error(err);
      alert("カメラが使えません");
      stopScanner();
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    let code = result.codeResult.code;
    stopScanner();
    document.getElementById("barcode").value = code;
    scan();
  });
}

function stopScanner(){
  Quagga.stop();
  document.getElementById("scanner-container").style.display = "none";
}
</script>

</body>
</html>
