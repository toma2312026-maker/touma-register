<!DOCTYPE html>
<html>
<body>

<h1>とうまセルフレジ</h1>

<button onclick="addItem('お菓子',100)">お菓子（100円）</button>
<button onclick="addItem('ジュース',150)">ジュース（150円）</button>

<h2>カート</h2>
<ul id="cart"></ul>

<h2 id="total"></h2>

<button onclick="checkout()">お会計</button>

<script>
let cart = [];

function addItem(name, price){
  cart.push({name, price});
  let li = document.createElement("li");
  li.textContent = name + " " + price + "円";
  document.getElementById("cart").appendChild(li);
}

function checkout(){
  let total = 0;
  for(let i=0; i<cart.length; i++){
    total += cart[i].price;
  }
  document.getElementById("total").textContent =
    "合計 " + total + "円";
}
</script>

</body>
</html>
